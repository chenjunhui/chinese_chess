name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: |
        npm ci
        cd server && npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Start backend server
      run: cd server && npm start &
    - name: Start frontend dev server
      run: npm run dev &
    - name: Wait for servers
      run: sleep 5
    - name: Check servers
      run: |
        curl -s http://localhost:3000 || echo "Backend not ready"
        curl -s http://localhost:5173 || echo "Frontend not ready"
    - name: Debug playwright config
      run: npx playwright show-config || true
    - name: Run Playwright tests
      run: npx playwright test --project=chromium --reporter=line
      env:
        DEBUG: playwright:*
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
